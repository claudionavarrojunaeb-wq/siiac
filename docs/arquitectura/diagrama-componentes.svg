<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155" />
    </marker>
    <style>
      .box { fill:#ffffff; stroke:#334155; stroke-width:2px; rx:6; }
      .title { font: 700 14px/1.2 'Segoe UI', Roboto, Arial; fill:#0f172a }
      .label { font: 400 13px/1.2 'Segoe UI', Roboto, Arial; fill:#0f172a }
      .small { font: 400 11px/1.2 'Segoe UI', Roboto, Arial; fill:#0f172a }
      .doc { fill:#f8fafc; stroke:#94a3b8; stroke-width:1px; }
    </style>
  </defs>

  <!-- Browser & ngrok -->
  <rect x="40" y="40" width="160" height="60" class="box" />
  <text x="120" y="70" text-anchor="middle" class="title">Browser / Mobile</text>

  <rect x="240" y="40" width="220" height="60" class="box" />
  <text x="350" y="60" text-anchor="middle" class="title">ngrok (túnel público)</text>
  <text x="350" y="76" text-anchor="middle" class="small">(opcional)</text>

  <!-- Frontend cluster -->
  <rect x="40" y="140" width="460" height="220" rx="10" ry="10" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5" />
  <text x="60" y="160" class="title">Frontend</text>
  <rect x="70" y="180" width="200" height="60" class="box" />
  <text x="170" y="215" text-anchor="middle" class="label">Vite Dev Server</text>
  <text x="170" y="232" text-anchor="middle" class="small">(port 5173)</text>

  <rect x="300" y="180" width="200" height="60" class="box" />
  <text x="400" y="205" text-anchor="middle" class="label">React 19 + TypeScript</text>
  <text x="400" y="222" text-anchor="middle" class="small">(frontend/src)</text>

  <!-- Backend cluster -->
  <rect x="560" y="140" width="460" height="220" rx="10" ry="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.5" />
  <text x="580" y="160" class="title">Backend</text>
  <rect x="590" y="180" width="200" height="60" class="box" />
  <text x="690" y="215" text-anchor="middle" class="label">Express API</text>
  <text x="690" y="232" text-anchor="middle" class="small">(backend/index.js)</text>

  <rect x="810" y="180" width="200" height="60" class="box" />
  <text x="910" y="205" text-anchor="middle" class="label">PostgreSQL</text>
  <text x="910" y="222" text-anchor="middle" class="small">(siiac)</text>

  <!-- Docs / History / Preferences -->
  <rect x="40" y="400" width="260" height="90" class="doc" rx="6" ry="6" />
  <text x="170" y="424" text-anchor="middle" class="label">BBDD.md</text>
  <text x="170" y="444" text-anchor="middle" class="small">(Documentación SQL)</text>

  <rect x="340" y="400" width="260" height="90" class="doc" rx="6" ry="6" />
  <text x="470" y="424" text-anchor="middle" class="label">Historial de sesiones</text>
  <text x="470" y="444" text-anchor="middle" class="small">(archivos de sesión)</text>

  <rect x="640" y="400" width="260" height="90" class="doc" rx="6" ry="6" />
  <text x="770" y="424" text-anchor="middle" class="label">preferences.md</text>
  <text x="770" y="444" text-anchor="middle" class="small">(Preferencias y reglas)</text>

  <!-- Arrows -->
  <line x1="200" y1="100" x2="240" y2="70" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="120" y1="100" x2="120" y2="140" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="460" y1="210" x2="560" y2="210" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="740" y1="240" x2="740" y2="280" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="730" y1="240" x2="900" y2="240" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />

  <line x1="200" y1="260" x2="470" y2="400" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)" />
  <line x1="690" y1="260" x2="610" y2="400" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)" />

  <!-- Footer note -->
  <text x="40" y="620" class="small">Generado: 2026-04-23 (hora local America/Santiago). Archivo: docs/diagrama-componentes.svg</text>

</svg>
